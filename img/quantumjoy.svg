<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 64 64" role="img" aria-label="Logo de QuantumJoy">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#151c2e"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </radialGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ab9e6"/>
      <stop offset="100%" stop-color="#067da0"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3c28"/>
      <stop offset="100%" stop-color="#b81f10"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" fill="url(#bg)"/>

  <g transform="translate(9.6,9.6) scale(0.7)">
    <rect x="4" y="14" width="14" height="36" rx="7" fill="url(#blue)" filter="url(#glow)"/>
    <rect x="46" y="14" width="14" height="36" rx="7" fill="url(#red)" filter="url(#glow)"/>
    <rect x="18" y="16" width="28" height="32" rx="3" fill="#0b0e16" stroke="#242b3c" stroke-width="1"/>
    <g stroke="#ffffff" stroke-width="0.6" opacity="0.07">
      <line x1="20" y1="21" x2="44" y2="21"/>
      <line x1="20" y1="25" x2="44" y2="25"/>
      <line x1="20" y1="29" x2="44" y2="29"/>
      <line x1="20" y1="33" x2="44" y2="33"/>
      <line x1="20" y1="37" x2="44" y2="37"/>
      <line x1="20" y1="41" x2="44" y2="41"/>
    </g>
    <circle cx="41.5" cy="44" r="1.1" fill="#ff3c28" filter="url(#glow)"/>
  </g>
</svg>
